<!--
  스크래퍼 결과 리스트에서 기사 1건 카드.
  app.py / cardnews.py 에서 str.format 으로 주입한다.
  모든 플레이스홀더는 반드시 html.escape 처리된 값이어야 한다 (I-8).
-->
<div class="news-card">
  <div class="card-meta">
    <span class="card-press">{press}</span>
    <span class="card-date">{date}</span>
    <span class="card-num">#{index}</span>
  </div>
  {thumbnail_block}
  <div class="card-title">{title}</div>
  <div class="card-summary">{summary}</div>
  <div class="card-keywords">{keywords}</div>
  <a class="card-link" href="{url}" target="_blank" rel="noopener noreferrer">원문 보기 →</a>
</div>
